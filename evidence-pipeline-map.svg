<svg xmlns="http://www.w3.org/2000/svg" width="1680" height="1012" viewBox="0 0 1680 1012" role="img" aria-label="MBAL stable evidence pipeline diagram" style="background:#fcfdff; font-family:'IBM Plex Sans','Segoe UI',sans-serif;">
  <title>Monterey Bay AI Lab stable evidence pipeline</title>
  <desc>Full stack map showing how MBAL questions move through value gates, data, lakehouse transforms, representations, discovery engines, evaluation, ledgers, reports, decision surfaces, stop paths, and ops guardrails.</desc>
        <defs>
          <marker id="arrow" markerWidth="9" markerHeight="8" refX="7.5" refY="4" orient="auto">
            <path d="M0,0 L9,4 L0,8 Z" fill="#7a899b"></path>
          </marker>
        </defs>

        <rect x="22" y="20" width="1636" height="974" rx="12" fill="#ffffff" stroke="#e2e8f0"></rect>

        <text x="54" y="62" font-size="13.5" font-weight="600" fill="#334155" font-family="'IBM Plex Mono',monospace">Control plane — decide what is worth running</text>
        <text x="54" y="218" font-size="13.5" font-weight="600" fill="#334155" font-family="'IBM Plex Mono',monospace">Evidence plane — build data, features, representations, and models</text>
        <text x="54" y="660" font-size="13.5" font-weight="600" fill="#334155" font-family="'IBM Plex Mono',monospace">Claim plane — evaluate, ledger, report, surface, or stop</text>
        <text x="54" y="888" font-size="13.5" font-weight="600" fill="#334155" font-family="'IBM Plex Mono',monospace">Ops plane — concurrency, GPU, telemetry, reproducibility</text>

        <line x1="44" y1="84" x2="1636" y2="84" stroke="#edf1f6"></line>
        <line x1="44" y1="240" x2="1636" y2="240" stroke="#edf1f6"></line>
        <line x1="44" y1="682" x2="1636" y2="682" stroke="#edf1f6"></line>
        <line x1="44" y1="910" x2="1636" y2="910" stroke="#edf1f6"></line>

        <!-- CONTROL PLANE -->
        <g>
          <rect x="62" y="110" width="274" height="84" rx="7" fill="#ffffff" stroke="#cfd8e4"></rect>
          <text x="82" y="138" font-size="16" font-weight="700" fill="#111827">Question</text>
          <text x="82" y="160" font-size="12" fill="#405065">stakeholder ask or research gap</text>
          <text x="82" y="180" font-size="10" fill="#64748b" font-family="'IBM Plex Mono',monospace">question ledger / user prompt</text>

          <rect x="382" y="110" width="274" height="84" rx="7" fill="#eef3fc" stroke="#bcccef"></rect>
          <text x="402" y="138" font-size="16" font-weight="700" fill="#111827">Value + Portfolio Gate</text>
          <text x="402" y="160" font-size="12" fill="#405065">not bloat, not saturated retread</text>
          <text x="402" y="180" font-size="10" fill="#64748b" font-family="'IBM Plex Mono',monospace">docs/VALUE_GATE.md, hypothesis gate</text>

          <rect x="702" y="110" width="274" height="84" rx="7" fill="#eef3fc" stroke="#bcccef"></rect>
          <text x="722" y="138" font-size="16" font-weight="700" fill="#111827">Memory + Asset Check</text>
          <text x="722" y="160" font-size="12" fill="#405065">catalogs, reports, nulls, locks</text>
          <text x="722" y="180" font-size="10" fill="#64748b" font-family="'IBM Plex Mono',monospace">signals, reports, rejected ledgers</text>

          <rect x="1022" y="110" width="274" height="84" rx="7" fill="#eef3fc" stroke="#bcccef"></rect>
          <text x="1042" y="138" font-size="16" font-weight="700" fill="#111827">Target Contract</text>
          <text x="1042" y="160" font-size="12" fill="#405065">label, horizon, unit, holdout</text>
          <text x="1042" y="180" font-size="10" fill="#64748b" font-family="'IBM Plex Mono',monospace">target_portfolio, reporting style</text>

          <rect x="1342" y="110" width="274" height="84" rx="7" fill="#eef3fc" stroke="#bcccef"></rect>
          <text x="1362" y="138" font-size="16" font-weight="700" fill="#111827">Baseline + Kill Rule</text>
          <text x="1362" y="160" font-size="12" fill="#405065">persistence, seasonal, incumbent</text>
          <text x="1362" y="180" font-size="10" fill="#64748b" font-family="'IBM Plex Mono',monospace">prevents weak-baseline wins</text>
        </g>
        <path d="M336 152 H374" fill="none" stroke="#7a899b" stroke-width="2" marker-end="url(#arrow)"></path>
        <path d="M656 152 H694" fill="none" stroke="#7a899b" stroke-width="2" marker-end="url(#arrow)"></path>
        <path d="M976 152 H1014" fill="none" stroke="#7a899b" stroke-width="2" marker-end="url(#arrow)"></path>
        <path d="M1296 152 H1334" fill="none" stroke="#7a899b" stroke-width="2" marker-end="url(#arrow)"></path>

        <!-- EVIDENCE PLANE — ROW A -->
        <g>
          <rect x="62" y="278" width="274" height="116" rx="7" fill="#ecf8f3" stroke="#aedaca"></rect>
          <text x="82" y="306" font-size="16" font-weight="700" fill="#111827">Data Inventory</text>
          <text x="82" y="329" font-size="12" fill="#405065">use existing data before fetch</text>
          <text x="82" y="351" font-size="10" fill="#64748b" font-family="'IBM Plex Mono',monospace">data/external_curated</text>
          <text x="82" y="369" font-size="10" fill="#64748b" font-family="'IBM Plex Mono',monospace">lakehouse/bronze, silver</text>

          <rect x="382" y="278" width="274" height="116" rx="7" fill="#ecf8f3" stroke="#aedaca"></rect>
          <text x="402" y="306" font-size="16" font-weight="700" fill="#111827">Adapters + Fetchers</text>
          <text x="402" y="329" font-size="12" fill="#405065">keyless / credentialed sources</text>
          <text x="402" y="351" font-size="10" fill="#64748b" font-family="'IBM Plex Mono',monospace">ops/data_fetch/registry*.py</text>
          <text x="402" y="369" font-size="10" fill="#64748b" font-family="'IBM Plex Mono',monospace">bounded staged parquet</text>

          <rect x="702" y="278" width="274" height="116" rx="7" fill="#ecf8f3" stroke="#aedaca"></rect>
          <text x="722" y="306" font-size="16" font-weight="700" fill="#111827">Lakehouse + Semantics</text>
          <text x="722" y="329" font-size="12" fill="#405065">normalized obs, events, static</text>
          <text x="722" y="351" font-size="10" fill="#64748b" font-family="'IBM Plex Mono',monospace">silver normalized_* stores</text>
          <text x="722" y="369" font-size="10" fill="#64748b" font-family="'IBM Plex Mono',monospace">semantic shadow / source inventory</text>

          <rect x="1022" y="278" width="274" height="116" rx="7" fill="#e7f5f1" stroke="#a2d6cd"></rect>
          <text x="1042" y="306" font-size="16" font-weight="700" fill="#111827">Leakage-Safe Joins</text>
          <text x="1042" y="329" font-size="12" fill="#405065">as-of time, station/site keys</text>
          <text x="1042" y="351" font-size="10" fill="#64748b" font-family="'IBM Plex Mono',monospace">merge_asof, reveal lag, no future</text>
          <text x="1042" y="369" font-size="10" fill="#64748b" font-family="'IBM Plex Mono',monospace">availability is part of contract</text>

          <rect x="1342" y="278" width="274" height="116" rx="7" fill="#e7f5f1" stroke="#a2d6cd"></rect>
          <text x="1362" y="306" font-size="16" font-weight="700" fill="#111827">Feature Panels</text>
          <text x="1362" y="329" font-size="12" fill="#405065">target-specific causal frames</text>
          <text x="1362" y="351" font-size="10" fill="#64748b" font-family="'IBM Plex Mono',monospace">bacteria, HAB, hypoxia, hazards</text>
          <text x="1362" y="369" font-size="10" fill="#64748b" font-family="'IBM Plex Mono',monospace">station memory, weather, ocean</text>
        </g>
        <path d="M336 336 H374" fill="none" stroke="#7a899b" stroke-width="2" marker-end="url(#arrow)"></path>
        <path d="M656 336 H694" fill="none" stroke="#7a899b" stroke-width="2" marker-end="url(#arrow)"></path>
        <path d="M976 336 H1014" fill="none" stroke="#7a899b" stroke-width="2" marker-end="url(#arrow)"></path>
        <path d="M1296 336 H1334" fill="none" stroke="#7a899b" stroke-width="2" marker-end="url(#arrow)"></path>

        <!-- carriage return: Feature Panels -> Representations -->
        <path d="M1479 394 V410 Q1479 420 1469 420 H209 Q199 420 199 430 V444" fill="none" stroke="#7a899b" stroke-width="2" marker-end="url(#arrow)"></path>

        <!-- EVIDENCE PLANE — ROW B -->
        <g>
          <rect x="62" y="450" width="274" height="128" rx="7" fill="#eef0fe" stroke="#c2c9fb"></rect>
          <text x="82" y="479" font-size="16" font-weight="700" fill="#111827">Representations</text>
          <text x="82" y="502" font-size="12" fill="#405065">pi groups, embeddings, tensors</text>
          <text x="82" y="524" font-size="10" fill="#64748b" font-family="'IBM Plex Mono',monospace">interlingua / dimensionless physics</text>
          <text x="82" y="542" font-size="10" fill="#64748b" font-family="'IBM Plex Mono',monospace">all-lakehouse AE, tensor discovery</text>
          <text x="82" y="562" font-size="10" fill="#7c6f3a" font-family="'IBM Plex Mono',monospace">representation is not a claim</text>

          <rect x="382" y="450" width="274" height="128" rx="7" fill="#fdf4ea" stroke="#efc596"></rect>
          <text x="402" y="479" font-size="16" font-weight="700" fill="#111827">Discovery Engines</text>
          <text x="402" y="502" font-size="12" fill="#405065">bounded model/search harnesses</text>
          <text x="402" y="524" font-size="10" fill="#64748b" font-family="'IBM Plex Mono',monospace">HGBT, logistic, transfer, GPU/deep</text>
          <text x="402" y="542" font-size="10" fill="#64748b" font-family="'IBM Plex Mono',monospace">combo gates, tensor probes, swarms</text>
          <text x="402" y="562" font-size="10" fill="#7c6f3a" font-family="'IBM Plex Mono',monospace">selection needs null controls</text>

          <rect x="702" y="450" width="274" height="128" rx="7" fill="#fdeef0" stroke="#f0aab4"></rect>
          <text x="722" y="479" font-size="16" font-weight="700" fill="#111827">Evaluation Gate</text>
          <text x="722" y="502" font-size="12" fill="#405065">baseline, holdout, CI, permutation</text>
          <text x="722" y="524" font-size="10" fill="#64748b" font-family="'IBM Plex Mono',monospace">ops/eval_standard.py</text>
          <text x="722" y="542" font-size="10" fill="#64748b" font-family="'IBM Plex Mono',monospace">signal_lab, ClaimCards, house style</text>
          <text x="722" y="562" font-size="10" fill="#9a4b54" font-family="'IBM Plex Mono',monospace">calibration for decisions</text>

          <rect x="1022" y="450" width="274" height="128" rx="7" fill="#fdeef0" stroke="#f0aab4"></rect>
          <text x="1042" y="479" font-size="16" font-weight="700" fill="#111827">Adversarial Critics</text>
          <text x="1042" y="502" font-size="12" fill="#405065">try to default-refute the claim</text>
          <text x="1042" y="524" font-size="10" fill="#64748b" font-family="'IBM Plex Mono',monospace">baseline strength, leakage, unit</text>
          <text x="1042" y="542" font-size="10" fill="#64748b" font-family="'IBM Plex Mono',monospace">power/MDE, negative controls, repro</text>
          <text x="1042" y="562" font-size="10" fill="#9a4b54" font-family="'IBM Plex Mono',monospace">no critic pass, no headline</text>

          <!-- annotation box: tensorification -->
          <rect x="1342" y="450" width="274" height="128" rx="7" fill="#fbfcfe" stroke="#c9cfd9" stroke-dasharray="5 4"></rect>
          <text x="1362" y="474" font-size="9" font-weight="600" letter-spacing="0.14em" fill="#94a0b0" font-family="'IBM Plex Mono',monospace">ANNOTATION</text>
          <text x="1362" y="495" font-size="14" font-weight="700" fill="#334155">Tensorification job</text>
          <text x="1362" y="518" font-size="10" fill="#5e6b7d" font-family="'IBM Plex Mono',monospace">lakehouse rows → all-lakehouse AE</text>
          <text x="1362" y="534" font-size="10" fill="#5e6b7d" font-family="'IBM Plex Mono',monospace">→ embeddings, clusters, anomalies</text>
          <text x="1362" y="550" font-size="10" fill="#5e6b7d" font-family="'IBM Plex Mono',monospace">→ label probes, permutation eval</text>
          <text x="1362" y="566" font-size="10" fill="#9a4b54" font-family="'IBM Plex Mono',monospace">→ signal or null (not a claim)</text>
        </g>
        <path d="M336 514 H374" fill="none" stroke="#7a899b" stroke-width="2" marker-end="url(#arrow)"></path>
        <path d="M656 514 H694" fill="none" stroke="#7a899b" stroke-width="2" marker-end="url(#arrow)"></path>
        <path d="M976 514 H1014" fill="none" stroke="#7a899b" stroke-width="2" marker-end="url(#arrow)"></path>

        <!-- carriage return: Adversarial Critics -> Result Verdict -->
        <path d="M1159 578 V696 Q1159 706 1149 706 H209 Q199 706 199 712 V714" fill="none" stroke="#7a899b" stroke-width="2" marker-end="url(#arrow)"></path>

        <!-- CLAIM PLANE -->
        <g>
          <rect x="62" y="720" width="274" height="116" rx="7" fill="#f3f1fd" stroke="#cdc1f3"></rect>
          <text x="82" y="748" font-size="16" font-weight="700" fill="#111827">Result Verdict</text>
          <text x="82" y="771" font-size="12" fill="#405065">PASS · NULL · WASH · REJECT · BLOCKED</text>
          <text x="82" y="793" font-size="10" fill="#64748b" font-family="'IBM Plex Mono',monospace">nulls are valuable if powered</text>
          <text x="82" y="811" font-size="10" fill="#64748b" font-family="'IBM Plex Mono',monospace">underpowered means no evidence</text>

          <rect x="382" y="720" width="274" height="116" rx="7" fill="#f3f1fd" stroke="#cdc1f3"></rect>
          <text x="402" y="748" font-size="16" font-weight="700" fill="#111827">Ledgers</text>
          <text x="402" y="771" font-size="12" fill="#405065">single source of truth by role</text>
          <text x="402" y="793" font-size="10" fill="#64748b" font-family="'IBM Plex Mono',monospace">signals/catalog.yaml</text>
          <text x="402" y="811" font-size="10" fill="#64748b" font-family="'IBM Plex Mono',monospace">target_portfolio, model_registry</text>

          <rect x="702" y="720" width="274" height="116" rx="7" fill="#f3f1fd" stroke="#cdc1f3"></rect>
          <text x="722" y="748" font-size="16" font-weight="700" fill="#111827">Reports + Repro</text>
          <text x="722" y="771" font-size="12" fill="#405065">artifacts, hashes, commands</text>
          <text x="722" y="793" font-size="10" fill="#64748b" font-family="'IBM Plex Mono',monospace">reports/*, docs/findings/*</text>
          <text x="722" y="811" font-size="10" fill="#64748b" font-family="'IBM Plex Mono',monospace">byte-stability when claimed</text>

          <rect x="1022" y="720" width="274" height="116" rx="7" fill="#eafbfd" stroke="#a4d9e1"></rect>
          <text x="1042" y="748" font-size="16" font-weight="700" fill="#111827">Decision Surfaces</text>
          <text x="1042" y="771" font-size="12" fill="#405065">pilots, dashboards, model suite</text>
          <text x="1042" y="793" font-size="10" fill="#64748b" font-family="'IBM Plex Mono',monospace">MODEL_SUITE.md, impact portfolio</text>
          <text x="1042" y="811" font-size="10" fill="#64748b" font-family="'IBM Plex Mono',monospace">only claimable after gates</text>

          <rect x="1342" y="720" width="274" height="116" rx="7" fill="#fdf0f0" stroke="#f6c9c9"></rect>
          <text x="1362" y="748" font-size="16" font-weight="700" fill="#111827">Stop Paths</text>
          <text x="1362" y="771" font-size="12" fill="#405065">not every lane must model</text>
          <text x="1362" y="793" font-size="10" fill="#64748b" font-family="'IBM Plex Mono',monospace">blocked, no-go, acquire data</text>
          <text x="1362" y="811" font-size="10" fill="#64748b" font-family="'IBM Plex Mono',monospace">prevents bloat loops</text>
        </g>
        <path d="M336 778 H374" fill="none" stroke="#7a899b" stroke-width="2" marker-end="url(#arrow)"></path>
        <path d="M656 778 H694" fill="none" stroke="#7a899b" stroke-width="2" marker-end="url(#arrow)"></path>
        <path d="M976 778 H1014" fill="none" stroke="#7a899b" stroke-width="2" marker-end="url(#arrow)"></path>
        <path d="M1296 778 H1334" fill="none" stroke="#7a899b" stroke-width="2" marker-end="url(#arrow)"></path>

        <!-- OPS PLANE -->
        <g>
          <rect x="62" y="930" width="274" height="44" rx="7" fill="#ecf4fd" stroke="#bdd6f4"></rect>
          <text x="82" y="957" font-size="11" fill="#3c4a5c" font-family="'IBM Plex Mono',monospace">agent_lock — no-clobber claims</text>
          <rect x="382" y="930" width="274" height="44" rx="7" fill="#ecf4fd" stroke="#bdd6f4"></rect>
          <text x="402" y="957" font-size="11" fill="#3c4a5c" font-family="'IBM Plex Mono',monospace">run_safe + GPU admission — bounded</text>
          <rect x="702" y="930" width="274" height="44" rx="7" fill="#ecf4fd" stroke="#bdd6f4"></rect>
          <text x="722" y="957" font-size="11" fill="#3c4a5c" font-family="'IBM Plex Mono',monospace">stack_viz + telemetry — live status</text>
          <rect x="1022" y="930" width="274" height="44" rx="7" fill="#ecf4fd" stroke="#bdd6f4"></rect>
          <text x="1042" y="957" font-size="11" fill="#3c4a5c" font-family="'IBM Plex Mono',monospace">tests + validators — fail closed</text>
          <rect x="1342" y="930" width="274" height="44" rx="7" fill="#ecf4fd" stroke="#bdd6f4"></rect>
          <text x="1362" y="957" font-size="11" fill="#3c4a5c" font-family="'IBM Plex Mono',monospace">GitHub only on request</text>
        </g>

        <!-- critical rule caption -->
        <text x="54" y="864" font-size="12" font-weight="700" fill="#9a4b54">Critical rule —</text>
        <text x="174" y="864" font-size="12" fill="#475569">a feature, embedding, model, or chart is not a claim until it survives the evaluation and critic gates.</text>
      </svg>
